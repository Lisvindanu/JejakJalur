<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#047857">
    <title>Tidak Ada Koneksi — JejakJalur</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #fafaf9;
            color: #1c1917;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            max-width: 360px;
            width: 100%;
            text-align: center;
        }
        .icon {
            width: 72px;
            height: 72px;
            background: #ecfdf5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        h1 {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1c1917;
        }
        p {
            font-size: 0.875rem;
            color: #78716c;
            line-height: 1.6;
            margin-bottom: 28px;
        }
        button {
            background: #047857;
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 10px 24px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        button:hover { background: #065f46; }
        @media (prefers-color-scheme: dark) {
            body { background: #1c1917; color: #fafaf9; }
            .icon { background: #064e3b; }
            h1 { color: #fafaf9; }
            p { color: #a8a29e; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">
            <svg width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="#047857" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 0 1 7.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 0 1 1.06 0Z" />
            </svg>
        </div>
        <h1>Tidak Ada Koneksi</h1>
        <p>Periksa koneksi internet kamu dan coba lagi. Beberapa halaman yang sudah dikunjungi mungkin masih bisa diakses.</p>
        <button onclick="window.location.reload()">Coba Lagi</button>
    </div>
</body>
</html>
