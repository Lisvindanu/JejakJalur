name: Deploy JejakJalur

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      run_seeders:
        description: 'Run db:seed --force (CAUTION: overwrites stasiun/koneksi data)'
        type: boolean
        default: false
      target:
        description: 'Target environment'
        type: choice
        default: 'staging'
        options:
          - staging
          - production

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' || (github.event_name == 'workflow_dispatch' && inputs.target == 'staging')
    steps:
      - name: Deploy to VPS (Staging)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: RUN_SEEDERS
          script: |
            set -e
            cd /var/www/jejakjalur-staging
            git fetch origin
            git reset --hard origin/dev
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            npm ci
            npm run build
            php artisan migrate --force
            if [ "$RUN_SEEDERS" = "true" ]; then
              echo "WARNING: Running seeders (manual trigger). This may overwrite stasiun/koneksi data."
              php artisan db:seed --force
            else
              echo "Skipping seeders (default). Schema/data fixes go via migrations."
            fi
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan optimize
            chown -R www-data:www-data /var/www/jejakjalur-staging/storage
            chown -R www-data:www-data /var/www/jejakjalur-staging/bootstrap/cache
            echo "Staging deployed at $(date)"
        env:
          RUN_SEEDERS: ${{ github.event_name == 'workflow_dispatch' && inputs.run_seeders == true }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.target == 'production')
    steps:
      - name: Deploy to VPS (Production)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: RUN_SEEDERS
          script: |
            set -e
            cd /var/www/jejakjalur-prod
            git fetch origin
            git reset --hard origin/main
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            npm ci
            npm run build
            php artisan migrate --force
            if [ "$RUN_SEEDERS" = "true" ]; then
              echo "WARNING: Running seeders (manual trigger). This may overwrite stasiun/koneksi data."
              php artisan db:seed --force
            else
              echo "Skipping seeders (default). Schema/data fixes go via migrations."
            fi
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan optimize
            chown -R www-data:www-data /var/www/jejakjalur-prod/storage
            chown -R www-data:www-data /var/www/jejakjalur-prod/bootstrap/cache
            echo "Production deployed at $(date)"
        env:
          RUN_SEEDERS: ${{ github.event_name == 'workflow_dispatch' && inputs.run_seeders == true }}
